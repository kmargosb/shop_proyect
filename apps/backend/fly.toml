# fly.toml app configuration file generated for shop-proyect-backend on 2026-06-25T14:52:37Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'shop-proyect-backend'
primary_region = 'jnb'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
