app = "shop-proyect-backend"
primary_region = "ams"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[deploy]
  release_command = "npx prisma migrate deploy"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256